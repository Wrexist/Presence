name: Backend checks

on:
  pull_request:
    branches: [main]
    paths:
      - "Backend/**"
      - ".github/workflows/backend-checks.yml"
  push:
    branches: [main]
    paths:
      - "Backend/**"
      - ".github/workflows/backend-checks.yml"
  workflow_dispatch:

concurrency:
  group: backend-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Typecheck & test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: Backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: Backend/package-lock.json

      - name: Install
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
